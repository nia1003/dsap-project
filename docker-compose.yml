services:
  ann-bench:
    build: .
    ports:
      - "8601:8601"
    volumes:
      - ./data:/app/data   # cache embeddings + downloaded LibriSpeech
    environment:
      - USE_SYNTHETIC=0    # real LibriSpeech test-clean, 5 speakers

  # Fast synthetic mode (no download, no PyTorch needed)
  ann-bench-synth:
    build: .
    ports:
      - "8602:8601"
    volumes:
      - ./data:/app/data
    environment:
      - USE_SYNTHETIC=1
    profiles:
      - synth
