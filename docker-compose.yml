services:
  ann-bench:
    build: .
    ports:
      - "8601:8601"
    volumes:
      - ./data:/app/data   # cache embeddings + downloaded LibriSpeech
    environment:
      - USE_SYNTHETIC=1    # set to 0 to use real LibriSpeech (downloads ~1GB, first run ~15 min)

  # Quick dev mode: no download, synthetic data only
  ann-bench-dev:
    build: .
    ports:
      - "8602:8601"
    volumes:
      - ./data:/app/data
    environment:
      - USE_SYNTHETIC=1
    profiles:
      - dev
