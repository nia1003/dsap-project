services:
  ann-bench:
    build: .
    ports:
      - "8601:8601"
    volumes:
      - ./data:/app/data   # cache embeddings + downloaded LibriSpeech
    environment:
      - USE_SYNTHETIC=1    # synthetic embeddings — instant start, no download

  # Real LibriSpeech mode (downloads ~350 MB test-clean, needs 10–15 min first run)
  ann-bench-real:
    build: .
    ports:
      - "8601:8601"
    volumes:
      - ./data:/app/data
    environment:
      - USE_SYNTHETIC=0
    profiles:
      - real
